name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # -------------------------------------------------------------------------
  # Fast feedback: lint + test on the PR diff only
  # -------------------------------------------------------------------------
  pr-lint:
    name: "PR • Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade ruff
      - run: ruff format --check src/ tests/
      - run: ruff check src/ tests/

  pr-test:
    name: "PR • Test"
    runs-on: ubuntu-latest
    needs: pr-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  pr-security:
    name: "PR • Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Scan changed files
        run: bandit -r src/ --severity-level high -f txt
